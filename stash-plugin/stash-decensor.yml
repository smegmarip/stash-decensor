name: Decensor
description: Decensor pixelated videos using AI
version: 1.0.0
url: https://github.com/yourusername/stash-decensor
settings:
  decensorApiUrl:
    displayName: Decensor API URL
    description: URL of the decensor API service (e.g. http://decensor-api:5030)
    type: STRING
  censoredTagId:
    displayName: Censored Tag ID
    description: Stash tag ID that marks scenes as censored
    type: STRING
  decensoredTagId:
    displayName: Decensored Tag ID
    description: Stash tag ID to apply after decensoring
    type: STRING
  maxBatchSize:
    displayName: Max Batch Size
    description: Maximum number of scenes to process in a batch (default 20)
    type: NUMBER
  cooldownSeconds:
    displayName: Cooldown Seconds
    description: Seconds to wait between batch tasks to prevent hardware stress (default 10)
    type: NUMBER
ui:
  requires:
    - CommunityScriptsUILibrary
  javascript:
    - https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js
    - js/stashFunctions.js
    - js/stash-decensor.js
exec:
  - gorpc/stash-decensor-rpc
interface: rpc
tasks:
  - name: Decensor Scene
    description: Decensor a pixelated video using AI
    defaultArgs:
      mode: decensor
  - name: Merge Decensored Scene
    description: Find and merge a decensored scene into the original
    defaultArgs:
      mode: merge
  - name: Batch Decensor
    description: Decensor all scenes with the censored tag
    defaultArgs:
      mode: decensorBatch
